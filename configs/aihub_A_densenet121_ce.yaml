# AI Hub 실험 A: DenseNet121 + CrossEntropy (베이스라인)
dataset:      aihub
data_root:    G:/내 드라이브/aihub_cropped
max_per_class: 16000           # 기쁨/분노 기준 균등 언더샘플링
emotions:     [기쁨, 당황, 분노, 불안, 상처, 슬픔, 중립]
val_test_ratio: 0.5

backbone:     densenet121
loss:         ce
focal_gamma:  2.0
epochs:       30
batch_size:   64
lr:           1e-4
weight_decay: 1e-4
scheduler:    cosine
use_edge:     false
num_workers:  4
seed:         42
output_dir:   output/aihub/A_densenet121_ce
