# park_sanghun — experiment config
# Run: python experiment.py --config park_sanghun/config.yaml

dataset:       aihub
data_root:     G:/내 드라이브/aihub_cropped
max_per_class: 16000
emotions:      [기쁨, 당황, 분노, 불안, 상처, 슬픔, 중립]
val_test_ratio: 0.5

# ── Model ──────────────────────────────────────────────────
# backbone options: efficientnet_b0 | densenet121 | densenet169 | resnet18 | resnet50
backbone:      densenet121

# ── Loss ───────────────────────────────────────────────────
# loss options: ce | focal
loss:          focal
focal_gamma:   2.0

# ── Training ───────────────────────────────────────────────
epochs:        30
batch_size:    64
lr:            1e-4
weight_decay:  1e-4
scheduler:     cosine   # cosine | step | none
use_edge:      false
num_workers:   4
seed:          42

output_dir:    park_sanghun/results
